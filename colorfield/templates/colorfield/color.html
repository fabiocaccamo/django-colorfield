<input type="text"
 id="{{ id }}"
 class="colorfield_field coloris {% if class %}{{ class }}{% else %}form-control{% endif %}"
 name="{{ name }}"
 value="{% firstof value default '' %}"
 placeholder="{% firstof value default '' %}"
 data-coloris="{format:'{{ format }}',alpha:{{ alpha }},forceAlpha:{{ alpha }},required:{% if required %}true{% else %}false{% endif %},clearButton:{{ clear_button }}{% if swatches %},swatches:{{ swatches|safe }},swatchesOnly:{{ swatches_only }}{% endif %}}"
 {% if disabled %}disabled{% endif %}
 {% if required %}required{% endif %} />
